<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>DinoCrush — Dinosaurai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,800&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#040810;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'Rajdhani',system-ui,sans-serif}
    canvas{display:block;position:fixed;top:0;left:0}
    #back{position:fixed;top:.85rem;left:.85rem;z-index:10;font-family:-apple-system,system-ui,sans-serif;font-size:.65rem;font-weight:600;letter-spacing:.1em;color:rgba(160,200,255,.22);text-decoration:none;transition:color .2s}
    #back:hover{color:rgba(160,200,255,.55)}
    #ui{position:fixed;top:.75rem;right:.75rem;z-index:10;display:flex;gap:.5rem}
    .ubtn{background:linear-gradient(rgba(4,10,24,.9),rgba(4,10,24,.9)) padding-box,linear-gradient(135deg,#7EFF50,#00FFCC 40%,#38D4FF 70%,#9B5CF6) border-box;border:1.5px solid transparent;border-radius:10px;box-shadow:0 0 14px rgba(56,212,255,.18),inset 0 1px 0 rgba(255,255,255,.07);color:rgba(126,255,80,.92);width:2.6rem;height:2.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:box-shadow .18s,opacity .15s;flex-shrink:0;padding:0}
    .ubtn:hover{box-shadow:0 0 22px rgba(56,212,255,.32),inset 0 1px 0 rgba(255,255,255,.1)}
    .ubtn:active{opacity:.78}
    #overlay{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(4,8,16,.85);backdrop-filter:blur(2px)}
    #overlay.hidden{display:none}
    .panel{background:linear-gradient(160deg,rgba(10,18,36,.97),rgba(4,10,24,.97));border:1.5px solid rgba(126,255,80,.18);border-radius:20px;box-shadow:0 0 60px rgba(0,160,255,.12),0 0 120px rgba(126,255,80,.06);padding:2.4rem 2.8rem;text-align:center;max-width:340px;width:90%}
    .panel-title{font-family:'Playfair Display',serif;font-style:italic;font-weight:800;font-size:2.4rem;line-height:1;color:#7EFF50;text-shadow:0 0 30px rgba(126,255,80,.6),0 0 60px rgba(126,255,80,.3);margin-bottom:.4rem}
    .panel-sub{font-size:.8rem;font-weight:600;letter-spacing:.14em;color:rgba(160,200,255,.45);margin-bottom:1.6rem;text-transform:uppercase}
    .panel-score{font-size:3.2rem;font-weight:700;color:#fff;line-height:1;margin-bottom:.25rem}
    .panel-best{font-size:.75rem;font-weight:600;letter-spacing:.1em;color:rgba(160,200,255,.45);margin-bottom:1.8rem;text-transform:uppercase}
    .play-btn{background:linear-gradient(135deg,#7EFF50,#00FFCC);border:none;border-radius:12px;color:#040810;font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;letter-spacing:.1em;padding:.85rem 2.2rem;cursor:pointer;transition:opacity .15s,box-shadow .18s;box-shadow:0 0 24px rgba(126,255,80,.35)}
    .play-btn:hover{opacity:.9;box-shadow:0 0 38px rgba(126,255,80,.5)}
    .play-btn:active{opacity:.75}
    #hud{position:fixed;bottom:0;left:0;right:0;z-index:10;display:flex;justify-content:center;gap:1.2rem;padding:.8rem 1rem;pointer-events:none}
    .hud-cell{background:linear-gradient(rgba(4,10,24,.9),rgba(4,10,24,.9)) padding-box,linear-gradient(135deg,#7EFF50,#00FFCC 40%,#38D4FF 70%,#9B5CF6) border-box;border:1.5px solid transparent;border-radius:12px;padding:.45rem .9rem;text-align:center;min-width:72px}
    .hud-label{font-size:.58rem;font-weight:700;letter-spacing:.12em;color:rgba(160,200,255,.42);text-transform:uppercase;display:block}
    .hud-val{font-size:1.3rem;font-weight:700;color:#fff;display:block;line-height:1.1}
    .hud-val.green{color:#7EFF50;text-shadow:0 0 12px rgba(126,255,80,.5)}
    .hud-val.orange{color:#FF6B35;text-shadow:0 0 12px rgba(255,107,53,.5)}
  </style>
</head>
<body>

<canvas id="g"></canvas>
<a id="back" href="/">← DINOSAURAI</a>
<div id="ui">
  <button class="ubtn" id="btn-mute" aria-label="Toggle sound"></button>
</div>

<div id="overlay">
  <div class="panel" id="panel-idle">
    <div class="panel-title">DINO CRUSH</div>
    <div class="panel-sub">Match 3 · Prehistoric Puzzle</div>
    <div style="font-size:2.8rem;margin-bottom:1.2rem">🦕🥚🦴</div>
    <div id="idle-best" class="panel-best" style="display:none"></div>
    <button class="play-btn" id="btn-play">PLAY</button>
  </div>
  <div class="panel" id="panel-dead" style="display:none">
    <div class="panel-title">EXTINCT</div>
    <div class="panel-sub">No moves left</div>
    <div class="panel-score" id="dead-score">0</div>
    <div class="panel-best" id="dead-best">BEST · 0</div>
    <button class="play-btn" id="btn-retry">TRY AGAIN</button>
  </div>
  <div class="panel" id="panel-level" style="display:none">
    <div class="panel-title" id="level-title">LEVEL 2</div>
    <div class="panel-sub">Prehistoric mastery</div>
    <div style="font-size:2.4rem;margin-bottom:1.2rem">⚡</div>
    <div class="panel-score" id="level-score">0</div>
    <div class="panel-best" style="margin-bottom:1.8rem">SCORE</div>
    <button class="play-btn" id="btn-continue">CONTINUE</button>
  </div>
</div>

<div id="hud" style="display:none">
  <div class="hud-cell">
    <span class="hud-label">Score</span>
    <span class="hud-val green" id="h-score">0</span>
  </div>
  <div class="hud-cell">
    <span class="hud-label">Moves</span>
    <span class="hud-val orange" id="h-moves">30</span>
  </div>
  <div class="hud-cell">
    <span class="hud-label">Level</span>
    <span class="hud-val" id="h-level">1</span>
  </div>
  <div class="hud-cell">
    <span class="hud-label">Target</span>
    <span class="hud-val" id="h-target">500</span>
  </div>
</div>

<script>
'use strict';

// ── CANVAS SETUP ───────────────────────────────────────
const cvs = document.getElementById('g');
const ctx = cvs.getContext('2d');
let W = 0, H = 0, dpr = 1;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 3);
  W = window.innerWidth; H = window.innerHeight;
  cvs.width = W * dpr; cvs.height = H * dpr;
  cvs.style.width = W + 'px'; cvs.style.height = H + 'px';
  ctx.scale(dpr, dpr);
  buildGrid();
}
window.addEventListener('resize', resize);

// ── AUDIO ──────────────────────────────────────────────
let ac = null, muted = false;
const SVG_SND_ON  = `<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 6.5H6L10 3v12l-4-3.5H3V6.5z" fill="currentColor"/><path d="M12 5.5c1.5 1 2 2.2 2 3.5s-.5 2.5-2 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/><path d="M14 3c2 2 3 3.8 3 6s-1 4-3 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>`;
const SVG_SND_OFF = `<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 6.5H6L10 3v12l-4-3.5H3V6.5z" fill="currentColor"/><line x1="12.5" y1="6" x2="16.5" y2="12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="16.5" y1="6" x2="12.5" y2="12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>`;
document.getElementById('btn-mute').innerHTML = SVG_SND_ON;

function initAudio() {
  if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
  else if (ac.state === 'suspended') ac.resume();
}
function tone(hz, vol, dur, type = 'sine', delay = 0) {
  if (!ac || muted) return;
  try {
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = type; o.frequency.value = hz;
    const t = ac.currentTime + delay;
    g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(vol, t + .012);
    g.gain.exponentialRampToValueAtTime(.0001, t + dur);
    o.start(t); o.stop(t + dur + .04);
  } catch(e) {}
}
function sfxSwap()  { tone(400, .05, .06, 'sine'); tone(550, .04, .06, 'sine', .06); }
function sfxMatch(n){ tone(660, .07, .08, 'sine'); if(n > 3) tone(880, .06, .1, 'sine', .07); if(n > 4) tone(1100, .05, .12, 'sine', .14); }
function sfxBad()   { tone(200, .06, .12, 'sawtooth'); }
function sfxLevel() { [660,880,1100,1320].forEach((f,i)=>tone(f,.07,.14,'sine',i*.08)); }
function sfxDead()  { tone(290,.1,.1,'sawtooth'); tone(180,.08,.18,'sawtooth',.1); tone(95,.07,.3,'sawtooth',.23); }

document.getElementById('btn-mute').addEventListener('pointerdown', e => {
  e.stopPropagation(); e.preventDefault();
  initAudio(); muted = !muted;
  document.getElementById('btn-mute').innerHTML = muted ? SVG_SND_OFF : SVG_SND_ON;
});

// ── GRID CONFIG ────────────────────────────────────────
const GCOLS = 8, GROWS = 8;
const GEMS = [
  { key: 'sauro',  color: '#7EFF50', glow: 'rgba(126,255,80,.55)',  icon: '🦕' },
  { key: 'rex',    color: '#FF6B35', glow: 'rgba(255,107,53,.55)',  icon: '🦖' },
  { key: 'egg',    color: '#00D4FF', glow: 'rgba(0,212,255,.55)',   icon: '🥚' },
  { key: 'bone',   color: '#9B5CF6', glow: 'rgba(155,92,246,.55)',  icon: '🦴' },
  { key: 'leaf',   color: '#FFD060', glow: 'rgba(255,208,96,.55)',  icon: '🌿' },
];
const NGEMS = GEMS.length;

let CS = 0, GX = 0, GY = 0; // cell size, grid top-left

function buildGrid() {
  const maxW = Math.min(W * .92, H * .7, 480);
  CS = Math.floor(maxW / GCOLS);
  GX = Math.round((W - CS * GCOLS) / 2);
  GY = Math.round((H - CS * GROWS) / 2) - 24;
}

// ── GAME STATE ─────────────────────────────────────────
let board = [];      // [row][col] = gemIndex (0-4) or -1 (empty)
let score = 0, hiScore = 0, moves = 0, level = 1;
const LEVEL_TARGETS = [500, 1200, 2500, 4500, 7000, 10000, 14000, 19000, 25000, 32000];
function levelTarget(lv) { return LEVEL_TARGETS[Math.min(lv - 1, LEVEL_TARGETS.length - 1)]; }
function movesForLevel(lv) { return Math.max(15, 32 - (lv - 1) * 2); }

hiScore = parseInt(localStorage.getItem('dc-hi') || '0');

let phase = 'idle'; // idle | playing | animating | dead | levelup
let sel = null;     // { r, c } selected gem

// Particles
let sparks = [];
// Falling animations
let falling = []; // { r, c, fromY, toY, t } (0→1)
// Swap animation
let swapAnim = null; // { r1,c1,r2,c2, t, revert }
// Match flash
let matchFlash = []; // { r, c, t }
// Combo fx
let comboFx = { text: '', alpha: 0, x: 0, y: 0 };
// Score fly-up
let scoreFx = []; // { val, x, y, vy, alpha }

// Background sparks
let bgSparks = [];
let rafId = 0, lastTs = 0;

// ── BOARD INIT ─────────────────────────────────────────
function randGem() { return Math.floor(Math.random() * NGEMS); }

function makeBoard() {
  const b = Array.from({length: GROWS}, () => Array(GCOLS).fill(-1));
  for (let r = 0; r < GROWS; r++)
    for (let c = 0; c < GCOLS; c++)
      b[r][c] = safeGem(b, r, c);
  return b;
}

function safeGem(b, r, c) {
  const forbidden = new Set();
  if (r >= 2 && b[r-1][c] === b[r-2][c]) forbidden.add(b[r-1][c]);
  if (c >= 2 && b[r][c-1] === b[r][c-2]) forbidden.add(b[r][c-1]);
  let g;
  do { g = randGem(); } while (forbidden.has(g));
  return g;
}

// ── MATCH DETECTION ────────────────────────────────────
function findMatches(b) {
  const matched = new Set();
  // Horizontal
  for (let r = 0; r < GROWS; r++)
    for (let c = 0; c < GCOLS - 2; c++) {
      const g = b[r][c];
      if (g < 0) continue;
      if (b[r][c+1] === g && b[r][c+2] === g) {
        let e = c + 3;
        while (e < GCOLS && b[r][e] === g) e++;
        for (let i = c; i < e; i++) matched.add(r * GCOLS + i);
      }
    }
  // Vertical
  for (let c = 0; c < GCOLS; c++)
    for (let r = 0; r < GROWS - 2; r++) {
      const g = b[r][c];
      if (g < 0) continue;
      if (b[r+1][c] === g && b[r+2][c] === g) {
        let e = r + 3;
        while (e < GROWS && b[e][c] === g) e++;
        for (let i = r; i < e; i++) matched.add(i * GCOLS + c);
      }
    }
  return matched;
}

function hasAnyMove(b) {
  for (let r = 0; r < GROWS; r++) {
    for (let c = 0; c < GCOLS; c++) {
      // try swap right
      if (c < GCOLS - 1) {
        const nb = swapBoard(b, r, c, r, c+1);
        if (findMatches(nb).size > 0) return true;
      }
      // try swap down
      if (r < GROWS - 1) {
        const nb = swapBoard(b, r, c, r+1, c);
        if (findMatches(nb).size > 0) return true;
      }
    }
  }
  return false;
}

function swapBoard(b, r1, c1, r2, c2) {
  const nb = b.map(row => [...row]);
  const tmp = nb[r1][c1]; nb[r1][c1] = nb[r2][c2]; nb[r2][c2] = tmp;
  return nb;
}

// ── GRAVITY / FILL ─────────────────────────────────────
function applyGravity(b) {
  const moves = [];
  for (let c = 0; c < GCOLS; c++) {
    let write = GROWS - 1;
    for (let r = GROWS - 1; r >= 0; r--) {
      if (b[r][c] >= 0) {
        if (r !== write) { moves.push({r, c, toR: write, c}); }
        write--;
      }
    }
    // fill top with new gems
    while (write >= 0) {
      moves.push({r: -1, c, toR: write, c, newGem: randGem()});
      write--;
    }
  }
  return moves;
}

function applyGravityToBoard(b) {
  const nb = b.map(row => [...row]);
  for (let c = 0; c < GCOLS; c++) {
    const col = [];
    for (let r = 0; r < GROWS; r++) if (nb[r][c] >= 0) col.push(nb[r][c]);
    while (col.length < GROWS) col.unshift(randGem());
    for (let r = 0; r < GROWS; r++) nb[r][c] = col[r];
  }
  return nb;
}

// ── RESOLVE LOOP (cascades) ────────────────────────────
let comboCount = 0;

function resolveMatches() {
  const matched = findMatches(board);
  if (matched.size === 0) {
    // Check dead
    if (!hasAnyMove(board)) { endGame(); return; }
    phase = 'playing';
    updateHUD();
    return;
  }

  comboCount++;
  const pts = matched.size * 30 * comboCount;
  score += pts;
  if (score > hiScore) { hiScore = score; localStorage.setItem('dc-hi', hiScore); }
  sfxMatch(matched.size);

  // Flash animation
  matched.forEach(k => {
    const r = Math.floor(k / GCOLS), c = k % GCOLS;
    matchFlash.push({r, c, t: 1});
    const px = GX + c * CS + CS / 2, py = GY + r * CS + CS / 2;
    spawnGemSparks(px, py, GEMS[board[r][c]]);
  });

  if (comboCount > 1) {
    const cx = GX + GCOLS * CS / 2, cy = GY + GROWS * CS / 2;
    scoreFx.push({val: '+' + pts + (comboCount > 1 ? '  x' + comboCount : ''), x: cx, y: cy, vy: -1.4, alpha: 1});
  } else {
    // Pick center of matched cluster
    let sumR = 0, sumC = 0;
    matched.forEach(k => { sumR += Math.floor(k / GCOLS); sumC += k % GCOLS; });
    const mr = sumR / matched.size, mc = sumC / matched.size;
    const px = GX + (mc + .5) * CS, py = GY + (mr - .3) * CS;
    scoreFx.push({val: '+' + pts, x: px, y: py, vy: -1.2, alpha: 1});
  }

  // Clear matched
  matched.forEach(k => { board[Math.floor(k / GCOLS)][k % GCOLS] = -1; });

  // Gravity + fill
  phase = 'animating';
  const gravMoves = [];
  for (let c = 0; c < GCOLS; c++) {
    const col = [];
    for (let r = 0; r < GROWS; r++) if (board[r][c] >= 0) col.push({g: board[r][c], origR: r});
    let write = GROWS - 1;
    for (let i = col.length - 1; i >= 0; i--) {
      if (col[i].origR !== write) gravMoves.push({fromR: col[i].origR, toR: write, c, g: col[i].g, isNew: false});
      write--;
    }
    while (write >= 0) {
      gravMoves.push({fromR: -1, toR: write, c, g: randGem(), isNew: true});
      write--;
    }
  }

  board = applyGravityToBoard(board.map(row => [...row]));

  falling = gravMoves.map(m => ({
    r: m.toR, c: m.c, g: m.g,
    fromY: (m.isNew ? -1 - (m.isNew ? Math.floor(Math.random() * 3) : 0) : m.fromR) * CS,
    toY: m.toR * CS,
    t: 0, speed: 0.012 + Math.random() * 0.006
  }));

  setTimeout(() => {
    falling = [];
    resolveMatches();
  }, 520);

  updateHUD();

  // Level up check
  if (score >= levelTarget(level)) {
    setTimeout(() => {
      if (phase !== 'dead') showLevelUp();
    }, 620);
  }
}

// ── GAME FLOW ──────────────────────────────────────────
function startGame() {
  board = makeBoard();
  score = 0; level = 1; moves = movesForLevel(level); comboCount = 0;
  sel = null; sparks = []; falling = []; matchFlash = []; scoreFx = [];
  phase = 'playing';
  document.getElementById('hud').style.display = 'flex';
  updateHUD();
  initAudio();
}

function endGame() {
  phase = 'dead';
  sel = null;
  sfxDead();
  document.getElementById('dead-score').textContent = score.toLocaleString();
  document.getElementById('dead-best').textContent = 'BEST · ' + hiScore.toLocaleString();
  showPanel('panel-dead');
}

function showLevelUp() {
  if (phase === 'dead') return;
  phase = 'levelup';
  level++;
  moves = movesForLevel(level);
  sfxLevel();
  document.getElementById('level-title').textContent = 'LEVEL ' + level;
  document.getElementById('level-score').textContent = score.toLocaleString();
  showPanel('panel-level');
}

function showPanel(id) {
  document.getElementById('overlay').classList.remove('hidden');
  ['panel-idle','panel-dead','panel-level'].forEach(p => {
    document.getElementById(p).style.display = p === id ? '' : 'none';
  });
}

function updateHUD() {
  document.getElementById('h-score').textContent = score.toLocaleString();
  document.getElementById('h-moves').textContent = moves;
  document.getElementById('h-level').textContent = level;
  document.getElementById('h-target').textContent = levelTarget(level).toLocaleString();
}

// ── INPUT ──────────────────────────────────────────────
function gridCell(px, py) {
  const c = Math.floor((px - GX) / CS);
  const r = Math.floor((py - GY) / CS);
  if (r < 0 || r >= GROWS || c < 0 || c >= GCOLS) return null;
  return {r, c};
}

cvs.addEventListener('pointerdown', e => {
  if (phase !== 'playing') return;
  initAudio();
  const rect = cvs.getBoundingClientRect();
  const px = e.clientX - rect.left, py = e.clientY - rect.top;
  const cell = gridCell(px, py);
  if (!cell) { sel = null; return; }

  if (!sel) {
    sel = cell;
    return;
  }

  const dr = Math.abs(cell.r - sel.r), dc = Math.abs(cell.c - sel.c);
  if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
    // Adjacent — attempt swap
    const {r: r1, c: c1} = sel;
    const {r: r2, c: c2} = cell;
    const newBoard = swapBoard(board, r1, c1, r2, c2);
    const matches = findMatches(newBoard);
    if (matches.size > 0) {
      board = newBoard;
      moves--;
      comboCount = 0;
      sfxSwap();
      swapAnim = {r1, c1, r2, c2, t: 0, revert: false};
      phase = 'animating';
      sel = null;
      if (moves <= 0) {
        setTimeout(() => {
          swapAnim = null;
          resolveMatches();
          setTimeout(() => { if (phase !== 'levelup') endGame(); }, 600);
        }, 220);
      } else {
        setTimeout(() => {
          swapAnim = null;
          resolveMatches();
        }, 220);
      }
    } else {
      // Bad swap — revert animation
      sfxBad();
      swapAnim = {r1, c1, r2, c2, t: 0, revert: true};
      setTimeout(() => { swapAnim = null; }, 320);
      sel = null;
    }
  } else {
    sel = cell; // reselect
  }
});

// Buttons
document.getElementById('btn-play').addEventListener('pointerdown', e => {
  e.stopPropagation();
  document.getElementById('overlay').classList.add('hidden');
  startGame();
});
document.getElementById('btn-retry').addEventListener('pointerdown', e => {
  e.stopPropagation();
  document.getElementById('overlay').classList.add('hidden');
  startGame();
});
document.getElementById('btn-continue').addEventListener('pointerdown', e => {
  e.stopPropagation();
  document.getElementById('overlay').classList.add('hidden');
  phase = 'playing';
  updateHUD();
});

// ── PARTICLES ──────────────────────────────────────────
function spawnGemSparks(x, y, gem) {
  const pal = [gem.color, '#FFFFFF', gem.color, '#38D4FF', '#FFD060'];
  for (let i = 0; i < 28; i++) {
    const a = (i / 28) * Math.PI * 2 + (Math.random() - .5) * .5;
    const s = 80 + Math.random() * 220;
    sparks.push({x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 60,
      life: 1, decay: .55 + Math.random() * .55, r: 1 + Math.random() * 4,
      c: pal[i % pal.length], glow: gem.glow});
  }
  // flash ring
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    sparks.push({x, y, vx: Math.cos(a)*350, vy: Math.sin(a)*350,
      life: 1, decay: 5 + Math.random() * 4, r: .5 + Math.random() * .8, c: '#FFFFFF'});
  }
}

function updateSparks(dt) {
  sparks.forEach(s => {
    s.x += s.vx * dt; s.y += s.vy * dt; s.vy += 280 * dt;
    s.life -= s.decay * dt;
  });
  sparks = sparks.filter(s => s.life > 0);
}

function spawnBgSpark() {
  bgSparks.push({
    x: Math.random() * W, y: H * (.1 + Math.random() * .8),
    vx: (Math.random() - .5) * 14, vy: -12 - Math.random() * 18, grav: 3,
    life: 1, decay: .10 + Math.random() * .07,
    r: .8 + Math.random() * 2,
    c: ['#00D4FF','#38D4FF','#9B5CF6','#00AAFF','#7EFF5055'][Math.floor(Math.random() * 5)],
    a: .18
  });
}

// ── DRAW ───────────────────────────────────────────────
function drawRoundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

function drawGem(cx, cy, size, gemIdx, alpha, selected, flashT, swapOff) {
  if (gemIdx < 0) return;
  const gem = GEMS[gemIdx];
  const px = cx + (swapOff ? swapOff.x : 0);
  const py = cy + (swapOff ? swapOff.y : 0);
  const pad = size * .10;
  const r = size * .18;
  const x = px - size/2 + pad, y = py - size/2 + pad;
  const w = size - pad*2, h = size - pad*2;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Glow
  const glowAmt = selected ? 22 : (flashT > 0 ? flashT * 30 : 8);
  ctx.shadowColor = gem.glow;
  ctx.shadowBlur = glowAmt;

  // Body gradient
  const bg = ctx.createLinearGradient(x, y, x + w, y + h);
  bg.addColorStop(0, lighten(gem.color, .35));
  bg.addColorStop(1, gem.color);
  drawRoundRect(x, y, w, h, r);
  ctx.fillStyle = bg;
  ctx.fill();

  // Flash overlay
  if (flashT > 0) {
    ctx.shadowBlur = 0;
    drawRoundRect(x, y, w, h, r);
    ctx.fillStyle = `rgba(255,255,255,${flashT * .7})`;
    ctx.fill();
  }

  // Border
  ctx.shadowBlur = 0;
  drawRoundRect(x, y, w, h, r);
  ctx.strokeStyle = selected ? '#FFFFFF' : gem.color + 'AA';
  ctx.lineWidth = selected ? 2.2 : 1.2;
  ctx.stroke();

  // Selected pulse ring
  if (selected) {
    const pulse = (Math.sin(Date.now() / 200) + 1) / 2;
    drawRoundRect(x - 3 - pulse * 2, y - 3 - pulse * 2, w + 6 + pulse * 4, h + 6 + pulse * 4, r + 3);
    ctx.strokeStyle = `rgba(255,255,255,${.35 + pulse * .25})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Emoji icon
  ctx.shadowBlur = 0;
  ctx.globalAlpha = alpha * (flashT > 0 ? Math.max(0, 1 - flashT * 1.5) : 1);
  ctx.font = `${Math.round(size * .38)}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.fillText(gem.icon, px, py + size * .02);

  ctx.restore();
}

function lighten(hex, amt) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const lr = Math.min(255, Math.round(r + (255-r)*amt));
  const lg = Math.min(255, Math.round(g + (255-g)*amt));
  const lb = Math.min(255, Math.round(b + (255-b)*amt));
  return `rgb(${lr},${lg},${lb})`;
}

function drawBoard() {
  // Grid background
  drawRoundRect(GX - 6, GY - 6, CS * GCOLS + 12, CS * GROWS + 12, 14);
  const gbg = ctx.createLinearGradient(GX, GY, GX, GY + CS * GROWS);
  gbg.addColorStop(0, 'rgba(10,18,40,.85)');
  gbg.addColorStop(1, 'rgba(4,8,20,.92)');
  ctx.fillStyle = gbg;
  ctx.fill();
  ctx.strokeStyle = 'rgba(126,255,80,.10)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Grid lines
  ctx.save();
  ctx.strokeStyle = 'rgba(126,255,80,.05)';
  ctx.lineWidth = 1;
  for (let r = 1; r < GROWS; r++) {
    ctx.beginPath(); ctx.moveTo(GX, GY + r*CS); ctx.lineTo(GX + GCOLS*CS, GY + r*CS); ctx.stroke();
  }
  for (let c = 1; c < GCOLS; c++) {
    ctx.beginPath(); ctx.moveTo(GX + c*CS, GY); ctx.lineTo(GX + c*CS, GY + GROWS*CS); ctx.stroke();
  }
  ctx.restore();

  // Flash & match
  const flashMap = {};
  matchFlash.forEach(f => { flashMap[f.r + '_' + f.c] = f.t; });

  // Falling gems
  const fallingMap = {};
  falling.forEach(f => {
    fallingMap[f.r + '_' + f.c] = f;
  });

  // Swap offsets
  const swapMap = {};
  if (swapAnim) {
    const {r1, c1, r2, c2, t, revert} = swapAnim;
    const ease = revert ? Math.sin(t * Math.PI) : t < .5 ? 2*t*t : -1+(4-2*t)*t;
    const dx = (c2 - c1) * CS * ease * (revert ? .4 : 1);
    const dy = (r2 - r1) * CS * ease * (revert ? .4 : 1);
    swapMap[r1+'_'+c1] = {x: dx, y: dy};
    swapMap[r2+'_'+c2] = {x: -dx, y: -dy};
  }

  for (let r = 0; r < GROWS; r++) {
    for (let c = 0; c < GCOLS; c++) {
      const key = r + '_' + c;
      const isSel = sel && sel.r === r && sel.c === c;
      const flashT = flashMap[key] || 0;
      const fall = fallingMap[key];
      const swapOff = swapMap[key] || null;

      let cx = GX + c * CS + CS / 2;
      let cy = GY + r * CS + CS / 2;

      let alpha = 1;
      if (fall) {
        const ease = fall.t < .6 ? fall.t / .6 : 1;
        const fromY = GY + fall.fromY;
        const toY = GY + fall.toY + CS / 2;
        cy = fromY + (toY - fromY) * ease + CS / 2;
        alpha = Math.min(1, fall.t * 3);
      }

      drawGem(cx, cy, CS, board[r][c], alpha, isSel, flashT, swapOff);
    }
  }
}

function drawSparks() {
  sparks.forEach(s => {
    ctx.save();
    ctx.globalAlpha = Math.max(0, s.life);
    ctx.shadowColor = s.glow || s.c;
    ctx.shadowBlur = 8;
    ctx.fillStyle = s.c;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

function drawBgSparks(dt) {
  bgSparks.forEach(s => {
    s.x += s.vx * dt; s.y += s.vy * dt; s.vy += s.grav * dt;
    s.life -= s.decay * dt;
    ctx.save();
    ctx.globalAlpha = Math.max(0, s.life * s.a);
    ctx.fillStyle = s.c;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  });
  bgSparks = bgSparks.filter(s => s.life > 0);
}

function drawScoreFx(dt) {
  scoreFx.forEach(f => {
    f.y += f.vy; f.alpha -= .016;
    ctx.save();
    ctx.globalAlpha = Math.max(0, f.alpha);
    ctx.shadowColor = '#7EFF50'; ctx.shadowBlur = 16;
    ctx.fillStyle = '#7EFF50';
    ctx.font = `bold ${Math.round(CS * .38)}px 'Rajdhani', sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(f.val, f.x, f.y);
    ctx.restore();
  });
  scoreFx = scoreFx.filter(f => f.alpha > 0);
}

// ── MAIN LOOP ──────────────────────────────────────────
function loop(ts) {
  rafId = requestAnimationFrame(loop);
  const dt = Math.min(.05, (ts - lastTs) / 1000);
  lastTs = ts;

  // Background
  ctx.clearRect(0, 0, W, H);

  // Deep background gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#040810');
  bg.addColorStop(1, '#060c14');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Ambient bg particles
  if (Math.random() < .025 && bgSparks.length < 120) spawnBgSpark();
  drawBgSparks(dt);

  // Swap anim progress
  if (swapAnim) {
    swapAnim.t = Math.min(1, swapAnim.t + dt * (swapAnim.revert ? 5 : 4.5));
  }

  // Match flash decay
  matchFlash.forEach(f => { f.t = Math.max(0, f.t - dt * 4); });
  matchFlash = matchFlash.filter(f => f.t > 0);

  // Falling progress
  falling.forEach(f => { f.t = Math.min(1, f.t + f.speed * 60 * dt); });

  if (phase !== 'idle') {
    drawBoard();
  }

  updateSparks(dt);
  drawSparks();
  drawScoreFx(dt);

  // Idle title
  if (phase === 'idle') {
    ctx.save();
    ctx.font = `italic 800 ${Math.round(W * .09)}px 'Playfair Display', serif`;
    ctx.fillStyle = '#7EFF50';
    ctx.globalAlpha = .06;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('DINO CRUSH', W/2, H/2);
    ctx.restore();
  }
}

// Init
resize();
// Show idle best
const savedHi = parseInt(localStorage.getItem('dc-hi') || '0');
if (savedHi > 0) {
  const ib = document.getElementById('idle-best');
  ib.style.display = '';
  ib.textContent = 'BEST · ' + savedHi.toLocaleString();
}
rafId = requestAnimationFrame(ts => { lastTs = ts; loop(ts); });
</script>
</body>
