<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>DinoSoar — Dinosaurai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#040810;touch-action:none;user-select:none;-webkit-user-select:none}
    canvas{display:block}
    #back{position:fixed;top:.85rem;left:.85rem;z-index:10;font-family:-apple-system,system-ui,sans-serif;font-size:.65rem;font-weight:600;letter-spacing:.1em;color:rgba(160,200,255,.22);text-decoration:none;transition:color .2s}
    #back:hover{color:rgba(160,200,255,.55)}
    #ui{position:fixed;top:.75rem;right:.75rem;z-index:10;display:flex;gap:.45rem}
    .ubtn{background:rgba(8,16,32,.72);border:1px solid rgba(0,200,255,.18);color:rgba(160,200,255,.6);font-size:1rem;width:2.4rem;height:2.4rem;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:border-color .18s;flex-shrink:0}
    .ubtn:active{border-color:rgba(0,200,255,.55)}
  </style>
</head>
<body>
<canvas id="g"></canvas>
<a id="back" href="/">← DINOSAURAI</a>
<div id="ui">
  <button class="ubtn" id="btn-mute" aria-label="Toggle sound">🔊</button>
  <button class="ubtn" id="btn-pause" aria-label="Pause" style="display:none">⏸</button>
</div>
<script>
'use strict';
const cvs=document.getElementById('g'),ctx=cvs.getContext('2d');
const btnMute=document.getElementById('btn-mute');
const btnPause=document.getElementById('btn-pause');
let W=0,H=0,dpr=1;

// ── HELPERS ───────────────────────────────────────────
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,a,b){return v<a?a:v>b?b:v;}
function rrect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ── RESPONSIVE SCALE ───────────────────────────────────
let PIPE_W,GAP0,GAP_MIN,GNDH,PIPE_SEP,HIT_R,BIRD_SZ,SPD0,SPD_MAX;
function computeScale(){
  BIRD_SZ=clamp(Math.min(W,H)*.15,52,88);
  PIPE_W=clamp(W*.07,36,80);
  GAP0=clamp(H*.30,170,250);
  GAP_MIN=clamp(H*.145,94,136);
  GNDH=clamp(H*.076,44,78);
  PIPE_SEP=clamp(W*.28,192,370);
  HIT_R=BIRD_SZ*.33;
  SPD0=clamp(W*.11,108,148);
  SPD_MAX=clamp(W*.325,295,425);
}
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,3);
  W=window.innerWidth;H=window.innerHeight;
  cvs.width=W*dpr;cvs.height=H*dpr;
  cvs.style.width=W+'px';cvs.style.height=H+'px';
  computeScale();
}
window.addEventListener('resize',resize);
resize();

// ── AUDIO ──────────────────────────────────────────────
let ac=null,muted=false;
function initAudio(){
  if(!ac){ac=new(window.AudioContext||window.webkitAudioContext)();startMusic();}
  else if(ac.state==='suspended')ac.resume();
}

// ── AMBIENT MUSIC ─────────────────────────────────────
// C major pentatonic (C D E G A), two octaves
const M_SCALE=[261.63,293.66,329.63,392.00,440.00,523.25,587.33,659.25,784.00,880.00];
// CMaj7 chord layers for pad drone
const M_PAD=[[32.70,.20,.3],[65.41,.16,.8],[130.81,.052,1.3],[164.81,.038,1.8],[196.00,.033,2.3],[246.94,.025,2.8],[261.63,.018,3.3]];
let musicMaster=null,musicReverb=null,musicActive=false,melodyIdx=4,melodyTimer=null;

function buildReverb(){
  const input=ac.createGain();
  const wet=ac.createGain();wet.gain.value=1;wet.connect(musicMaster);
  // Multi-tap delay — early reflections + reverb tail
  const taps=[0.0157,0.0293,0.0431,0.0617,0.0891,0.1213,0.1637,0.2143];
  const vols=[0.40,0.32,0.26,0.20,0.15,0.10,0.07,0.04];
  taps.forEach((t,i)=>{
    const d=ac.createDelay(t+.01);d.delayTime.value=t;
    const gd=ac.createGain();gd.gain.value=vols[i]*.16;
    input.connect(d);d.connect(gd);gd.connect(wet);
  });
  musicReverb=input;
}

function padNote(hz,vol,fadeIn){
  const o=ac.createOscillator(),gn=ac.createGain();
  o.type='sine';o.frequency.value=hz;
  gn.gain.setValueAtTime(0,ac.currentTime);
  gn.gain.linearRampToValueAtTime(muted?0:vol,ac.currentTime+fadeIn+2.2);
  o.connect(gn);gn.connect(musicMaster);
  if(musicReverb){const rs=ac.createGain();rs.gain.value=0.55;gn.connect(rs);rs.connect(musicReverb);}
  o.start();
}

function melodyTick(){
  if(!ac||!musicActive)return;
  const step=(Math.random()<0.55?1:-1)*(Math.floor(Math.random()*3)+1);
  melodyIdx=Math.max(0,Math.min(M_SCALE.length-1,melodyIdx+step));
  if(Math.random()<0.14)melodyIdx=Math.floor(Math.random()<0.6?0:4); // return to C root
  const hz=M_SCALE[melodyIdx];
  const dur=0.9+Math.random()*2.2;
  const vol=0.038+Math.random()*0.028;
  try{
    const o=ac.createOscillator(),gn=ac.createGain();
    o.type='triangle';o.frequency.value=hz;
    const t=ac.currentTime;
    gn.gain.setValueAtTime(0,t);
    gn.gain.linearRampToValueAtTime(muted?0:vol,t+0.032);
    gn.gain.setTargetAtTime(0.0001,t+0.2,dur*.30);
    o.connect(gn);gn.connect(musicMaster);
    if(musicReverb){const rs=ac.createGain();rs.gain.value=1.5;gn.connect(rs);rs.connect(musicReverb);}
    o.start(t);o.stop(t+dur+0.7);
  }catch(e){}
  melodyTimer=setTimeout(melodyTick,(dur*0.52+0.55+Math.random()*1.9)*1000);
}

function startMusic(){
  if(!ac||musicActive)return;
  musicActive=true;
  musicMaster=ac.createGain();
  musicMaster.gain.setValueAtTime(0,ac.currentTime);
  musicMaster.gain.linearRampToValueAtTime(muted?0:0.15,ac.currentTime+3.2);
  musicMaster.connect(ac.destination);
  buildReverb();
  M_PAD.forEach(([hz,vol,fi])=>padNote(hz,vol,fi));
  melodyTimer=setTimeout(melodyTick,3500);
}
function tone(hz,vol,dur,type='sine'){
  if(!ac||vol<.003||muted)return;
  try{
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type=type;o.frequency.value=hz;
    const t=ac.currentTime;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+.012);
    g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.start();o.stop(t+dur+.04);
  }catch(e){}
}
function sfxFlap(){tone(360,.055,.07,'triangle');tone(195,.03,.12,'sine');}
function sfxScore(){tone(620,.07,.08,'sine');setTimeout(()=>tone(840,.055,.1,'sine'),75);}
function sfxCoin(){tone(880,.05,.06,'sine');setTimeout(()=>tone(1100,.04,.08,'sine'),55);}
function sfxGem(){
  if(!ac||muted)return;
  try{
    const t=ac.currentTime;
    // Crystal bell — 4 harmonic layers
    [[1318.5,.065,0],[1760,.050,.018],[2637,.038,.032],[3520,.025,.052]].forEach(([f,v,d])=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='triangle';o.frequency.value=f;
      g.gain.setValueAtTime(0,t+d);g.gain.linearRampToValueAtTime(v,t+d+.012);
      g.gain.exponentialRampToValueAtTime(.0001,t+d+.7);
      o.connect(g);g.connect(ac.destination);o.start(t+d);o.stop(t+d+.85);
    });
    // Ultra-high shimmer
    const os=ac.createOscillator(),gs=ac.createGain();
    os.type='sine';os.frequency.value=4800;
    gs.gain.setValueAtTime(0,t);gs.gain.linearRampToValueAtTime(.018,t+.005);
    gs.gain.exponentialRampToValueAtTime(.0001,t+.32);
    os.connect(gs);gs.connect(ac.destination);os.start(t);os.stop(t+.4);
  }catch(e){}
}
function sfxNear(){tone(520,.03,.04,'sine');}
function sfxDeath(){
  tone(290,.14,.1,'sawtooth');
  setTimeout(()=>tone(180,.11,.18,'sawtooth'),105);
  setTimeout(()=>tone(95,.09,.3,'sawtooth'),230);
}
function sfxRoar(){
  if(!ac||muted)return;
  try{
    const t=ac.currentTime;
    // 8-bit death jingle — two octaves lower (all freqs ÷4); gain up for equal loudness
    [[329.63,0,.06],[261.63,.06,.06],
     [246.94,.12,.09],[233.08,.21,.09],
     [220.00,.30,.09],[207.65,.39,.09],
     [196.00,.48,.09],[185.00,.57,.09],
     [174.61,.66,.09],[164.81,.75,.09],
     [155.56,.84,.14]
    ].forEach(([hz,d,dur])=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='square';o.frequency.value=hz;
      g.gain.setValueAtTime(0,t+d);
      g.gain.linearRampToValueAtTime(.15,t+d+.005);
      g.gain.setValueAtTime(.15,t+d+dur-.01);
      g.gain.linearRampToValueAtTime(0,t+d+dur);
      o.connect(g);g.connect(ac.destination);
      o.start(t+d);o.stop(t+d+dur+.02);
    });
  }catch(e){}
}
function sfxStreak(){tone(960,.06,.06,'sine');setTimeout(()=>tone(1280,.05,.1,'sine'),65);}
function haptic(p){try{navigator.vibrate&&navigator.vibrate(p);}catch(e){}}

// ── CONFIG ─────────────────────────────────────────────
const GRV=1700,FLAP_V=-530,V_MAX=810;
const SPEEDLINES=Array.from({length:7},(_,i)=>({yR:.08+i*.115+(i*53%17)*.004,ph:i*.618}));
const MILESTONES={5:'#00CFFF',10:'#38D4FF',25:'#FF8C30',50:'#9B5CF6',100:'#FFD060'};

// ── STATE ──────────────────────────────────────────────
let phase='idle';
let bird,cols=[],sparks=[],shockwaves=[];
let score,hiScore,scrollX,speed;
let flapA=0,wingP=0;
let deadT=0,deathRot=0,scoreFx=0,newBestFx=0,scorePulse=0;
let milestoneFx={alpha:0,color:'#38D4FF'};
let shakeT=0,shakeAmt=0;
let frameN=0,lastTs=0;
let streak=0,streakFx=0,pausedPhase=null,lastLevel=1,levelUpFx=0;

hiScore=parseInt(localStorage.getItem('ds-hi')||'0');
function initBird(){bird={y:H*.44,vy:0};}
initBird();

// ── PAUSE ──────────────────────────────────────────────
function togglePause(){
  if(phase==='playing'){
    pausedPhase='playing';phase='paused';
    btnPause.textContent='▶';
  } else if(phase==='paused'){
    phase=pausedPhase||'playing';pausedPhase=null;
    btnPause.textContent='⏸';
    lastTs=0;
  }
}
document.addEventListener('visibilitychange',()=>{
  if(document.hidden&&phase==='playing')togglePause();
});
btnPause.addEventListener('pointerdown',e=>{e.stopPropagation();e.preventDefault();togglePause();});
btnMute.addEventListener('pointerdown',e=>{
  e.stopPropagation();e.preventDefault();
  initAudio();muted=!muted;btnMute.textContent=muted?'🔇':'🔊';
  if(musicMaster)musicMaster.gain.linearRampToValueAtTime(muted?0:0.15,ac.currentTime+0.4);
});

// ── RESET ──────────────────────────────────────────────
function reset(){
  bird.y=H*.44;bird.vy=0;
  cols=[];sparks=[];shockwaves=[];
  score=0;scrollX=0;speed=SPD0;
  flapA=0;deathRot=0;scoreFx=0;newBestFx=0;scorePulse=0;
  milestoneFx.alpha=0;shakeT=0;frameN=0;
  streak=0;streakFx=0;lastLevel=1;levelUpFx=0;
  addCol(W+70);
}
function addCol(x){
  const gapH=Math.max(GAP_MIN,GAP0-score*0.7);
  const pad=clamp(H*.06,24,58);
  const lo=GNDH+gapH/2+pad,hi=H-GNDH-gapH/2-pad;
  // Cap vertical jump from previous column so first-timers aren't punished
  let midLo=lo,midHi=hi;
  if(cols.length>0){
    const prev=cols[cols.length-1].baseMid;
    const maxJump=clamp(H*.13,55,110);
    midLo=Math.max(lo,prev-maxJump);
    midHi=Math.min(hi,prev+maxJump);
    if(midLo>midHi){midLo=lo;midHi=hi;}
  }
  const mid=midLo+Math.random()*(midHi-midLo);
  const col={x,mid,baseMid:mid,gapH,scored:false,hasCoin:Math.random()<.62,coinAlive:true,flashT:0};
  if(!col.hasCoin)col.coinAlive=false;
  if(score>=20&&Math.random()<.44)
    col.osc={amp:20+Math.random()*28,freq:.55+Math.random()*.55,phase:Math.random()*Math.PI*2};
  cols.push(col);
}

// ── INPUT ──────────────────────────────────────────────
function tap(){
  initAudio();
  if(phase==='idle'){
    phase='playing';reset();bird.vy=FLAP_V;flapA=1;sfxFlap();haptic(8);
    btnPause.style.display='flex';
  } else if(phase==='paused'){
    togglePause();
  } else if(phase==='dead'&&deadT>.78){
    phase='idle';cols=[];sparks=[];shockwaves=[];
    btnPause.style.display='none';btnPause.textContent='⏸';
  } else if(phase==='playing'){
    bird.vy=FLAP_V;flapA=1;sfxFlap();haptic(8);
    spawnFlapSparks(W*.22,bird.y);
  }
}
cvs.addEventListener('pointerdown',e=>{e.preventDefault();tap();},{passive:false});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();tap();}
  if(e.code==='KeyP'||e.code==='Escape'){if(phase==='playing'||phase==='paused')togglePause();}
  if(e.code==='KeyM'){muted=!muted;btnMute.textContent=muted?'🔇':'🔊';}
});

// ── UPDATE ─────────────────────────────────────────────
function update(dt,ts){
  // Ambient wisps — soft ethereal particles always drifting upward
  if((phase==='idle'||phase==='playing')&&Math.random()<0.018&&sparks.length<300)
    sparks.push({x:Math.random()*W,y:H*(.2+Math.random()*.65),
      vx:(Math.random()-.5)*12,vy:-16-Math.random()*22,grav:2,
      life:.85+Math.random()*.15,decay:.10+Math.random()*.06,
      r:1.1+Math.random()*2.2,
      c:['#00D4FF','#38D4FF','#9B5CF6','#00AAFF','#60A0FF'][Math.floor(Math.random()*5)],a:.24});
  if(phase==='paused')return;
  if(phase==='idle'){bird.y=H*.44+Math.sin(ts/520)*9;wingP=(Math.sin(ts/300)+1)/2;return;}
  if(phase==='dead'){
    deadT+=dt;deathRot+=dt*5.8;
    bird.vy=Math.min(bird.vy+GRV*dt*.6,V_MAX);
    bird.y=Math.min(bird.y+bird.vy*dt,H-GNDH-8);
    shakeT=Math.max(0,shakeT-dt*3.5);
    milestoneFx.alpha=Math.max(0,milestoneFx.alpha-dt*2);
    streakFx=Math.max(0,streakFx-dt*2.5);
    levelUpFx=Math.max(0,levelUpFx-dt*1.6);
    shockwaves.forEach(s=>{s.r+=dt*420;s.life=Math.max(0,1-s.r/s.maxR);});
    shockwaves=shockwaves.filter(s=>s.life>0);
    updSparks(dt);return;
  }

  frameN++;
  scrollX+=speed*dt;
  speed=Math.min(SPD_MAX,SPD0+score*3.5);
  scoreFx=Math.max(0,scoreFx-dt*5);
  newBestFx=Math.max(0,newBestFx-dt*1.5);
  scorePulse=Math.max(0,scorePulse-dt*6);
  streakFx=Math.max(0,streakFx-dt*2.5);
  levelUpFx=Math.max(0,levelUpFx-dt*1.6);
  milestoneFx.alpha=Math.max(0,milestoneFx.alpha-dt*2.2);

  bird.vy=Math.min(bird.vy+GRV*dt,V_MAX);bird.y+=bird.vy*dt;
  flapA=Math.max(0,flapA-dt*5.5);
  wingP=flapA>0?flapA:.5+Math.sin(ts/500)*.5;

  // Wing trail — every frame, 3 stream particles
  {
    const bx=W*.22,ws=BIRD_SZ/36;
    for(let i=0;i<3;i++)
      sparks.push({x:bx-38*ws+Math.random()*14,y:bird.y+(i===0?-16:i===1?16:0)*ws+Math.random()*10,
        vx:-60-Math.random()*55,vy:(Math.random()-.5)*30,
        life:1,decay:4+Math.random()*3,r:1+Math.random()*2,c:i===0?'#0090E0':i===1?'#00AAFF':'#40D4FF'});
  }
  // Larger wing puff every 3 frames
  if(frameN%3===0){
    const bx=W*.22,ws=BIRD_SZ/36;
    sparks.push({x:bx-44*ws+Math.random()*10,y:bird.y+(Math.random()-.5)*24*ws,
      vx:-38-Math.random()*28,vy:(Math.random()-.5)*18,
      life:1,decay:1.8+Math.random()*1.4,r:3+Math.random()*4,c:'#38D4FF'});
  }
  // Energy pulse ring every 10 frames
  if(frameN%10===0){
    const bx=W*.22;
    for(let i=0;i<5;i++){
      const a=(i/5)*Math.PI*2;
      sparks.push({x:bx,y:bird.y,vx:Math.cos(a)*42,vy:Math.sin(a)*42,
        life:1,decay:3.5+Math.random()*2,r:.8+Math.random()*1.4,c:'#0088FF'});
    }
  }

  cols.forEach(c=>{
    c.x-=speed*dt;
    c.flashT=Math.max(0,c.flashT-dt*3.5);
    if(c.osc)c.mid=c.baseMid+Math.sin(ts/1000*c.osc.freq+c.osc.phase)*c.osc.amp;
  });
  if(!cols.length||cols[cols.length-1].x<W-PIPE_SEP)addCol(W+8);
  cols=cols.filter(c=>c.x>-PIPE_W-20);

  const bx=W*.22;
  cols.forEach(c=>{
    if(!c.scored&&c.x+PIPE_W<bx){
      c.scored=true;score++;scoreFx=1;scorePulse=1;sfxScore();
      const clearance=Math.min(Math.abs(bird.y-(c.mid-c.gapH/2)),Math.abs(bird.y-(c.mid+c.gapH/2)));
      if(clearance<26){c.flashT=1;sfxNear();streak=0;}
      else{
        streak++;streakFx=1;
        if(streak>=3&&streak%5===0){sfxStreak();haptic([10,5,10]);}
      }
      const curLevel=Math.floor(score/10)+1;
      if(curLevel>lastLevel){lastLevel=curLevel;levelUpFx=1;sfxStreak();haptic([20,10,20,10,20]);}
      if(MILESTONES[score])milestoneFx={alpha:1,color:MILESTONES[score]};
      if(score>hiScore){hiScore=score;localStorage.setItem('ds-hi',hiScore);newBestFx=1;}
    }
    if(c.hasCoin&&c.coinAlive){
      const coinX=c.x+PIPE_W/2;
      if(Math.abs(coinX-bx)<PIPE_W*.35&&Math.abs(bird.y-c.mid)<28){
        c.coinAlive=false;score++;scoreFx=1;scorePulse=1;sfxGem();haptic([30,10,30]);
        spawnGemSparks(coinX,c.mid);
        if(score>hiScore){hiScore=score;localStorage.setItem('ds-hi',hiScore);newBestFx=1;}
      }
    }
  });

  if(bird.y-HIT_R<0||bird.y+HIT_R>H-GNDH){die();return;}
  for(const c of cols){
    if(bx+HIT_R>c.x+5&&bx-HIT_R<c.x+PIPE_W-5)
      if(bird.y-HIT_R<c.mid-c.gapH/2||bird.y+HIT_R>c.mid+c.gapH/2){die();return;}
  }
  updSparks(dt);
}

function die(){
  if(phase!=='playing')return;
  phase='dead';deadT=0;shakeT=.72;shakeAmt=22;streak=0;
  spawnSparks(W*.22,bird.y);sfxRoar();haptic([80,30,80,30,40]);
  shockwaves=[
    {x:W*.22,y:bird.y,r:0,maxR:clamp(W*.18,120,200),life:1,rgb:'0,160,255'},
    {x:W*.22,y:bird.y,r:0,maxR:clamp(W*.3,190,330),life:.7,rgb:'0,200,255'},
    {x:W*.22,y:bird.y,r:0,maxR:clamp(W*.44,260,480),life:.45,rgb:'255,200,80'},
  ];
  if(score>hiScore){hiScore=score;localStorage.setItem('ds-hi',hiScore);}
}

// ── SPARKS ─────────────────────────────────────────────
function spawnSparks(x,y){
  const pal=['#40D4FF','#00AAFF','#FF8C30','#9B5CF6','#FFD060','#80E8FF','#FF60A0','#FFFFFF','#38D4FF','#FF4466'];
  // Wave 1 — t=0ms: 300 fast primary blast, full 360°
  for(let i=0;i<300;i++){
    const a=(i/300)*Math.PI*2+(Math.random()-.5)*.4,s=260+Math.random()*720;
    sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-130,
      life:1,decay:.32+Math.random()*.46,r:1.5+Math.random()*7,c:pal[i%10]});
  }
  // Wave 2 — t=70ms: 200 secondary upward shower
  setTimeout(()=>{
    for(let i=0;i<200;i++){

      sparks.push({x:x+(Math.random()-.5)*65,y:y+(Math.random()-.5)*25,
        vx:Math.cos(a)*s,vy:Math.sin(a)*s,

  // Wave 3 — t=150ms: 150 wide scatter cloud

    for(let i=0;i<150;i++){
      const a=Math.random()*Math.PI*2,s=60+Math.random()*240;
      sparks.push({x:x+(Math.random()-.5)*110,y:y+(Math.random()-.5)*55,
        vx:Math.cos(a)*s,vy:Math.sin(a)*s-60,

  },150);
  // Wave 4 — t=240ms: 100 low-gravity floating embers

    for(let i=0;i<100;i++){
      const a=Math.random()*Math.PI*2,s=12+Math.random()*60;
      sparks.push({x:x+(Math.random()-.5)*130,y:y+(Math.random()-.5)*65,
        vx:Math.cos(a)*s,vy:Math.sin(a)*s-20,grav:95,
        life:1,decay:.08+Math.random()*.13,r:.5+Math.random()*2,c:'#FFFFFF'});
    }
  },240);
  // Wave 5 — t=320ms: 80 large slow colorful debris chunks
  setTimeout(()=>{
    for(let i=0;i<80;i++){
      const a=Math.random()*Math.PI*2,s=30+Math.random()*145;
      sparks.push({x:x+(Math.random()-.5)*80,y,
        vx:Math.cos(a)*s,vy:Math.sin(a)*s-70,
        life:1,decay:.10+Math.random()*.18,r:5+Math.random()*10,c:pal[i%10]});

  },320);
}
function spawnFlapSparks(x,y){
  // Echo wave — 3 rings below bird, staggered to create upward-push feel
  shockwaves.push({x,y:y+10,r:0,maxR:clamp(W*.06,40,70),life:1,rgb:'56,212,255'});
  setTimeout(()=>shockwaves.push({x,y:y+18,r:0,maxR:clamp(W*.10,65,100),life:.8,rgb:'80,210,255'}),60);
  setTimeout(()=>shockwaves.push({x,y:y+26,r:0,maxR:clamp(W*.14,90,140),life:.6,rgb:'0,160,255'}),120);
  // Small upward thrust burst
  for(let i=0;i<18;i++){
    const a=-Math.PI/2+(Math.random()-.5)*Math.PI*.9;
    const s=70+Math.random()*170;
    sparks.push({x:x+(Math.random()-.5)*24,y:y+6,
      vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:1,decay:3+Math.random()*2,r:.5+Math.random()*1.2,
      c:['#38D4FF','#80E8FF','#FFFFFF'][Math.floor(Math.random()*3)]});
  }
}
function spawnGemSparks(x,y){
  const pal=['#FFFFFF','#80E8FF','#38D4FF','#00AAFF','#C0F0FF','#0060FF','#A0D0FF'];
  const prism=['#FF44AA','#FF8800','#FFE000','#00FF88','#00DDFF','#9955FF','#FF44DD'];
  // Wave 1 — t=0: 60 radial needle beams + 30 crystal shards + 35 white flash
  for(let i=0;i<60;i++){
    const a=(i/60)*Math.PI*2+(Math.random()-.5)*.15,s=140+Math.random()*300;
    sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:1,decay:.8+Math.random()*.6,r:.5+Math.random()*1.2,c:pal[i%7]});
  }
  for(let i=0;i<30;i++){
    const a=Math.random()*Math.PI*2,s=90+Math.random()*180;
    sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-65,
      life:1,decay:.5+Math.random()*.35,r:.8+Math.random()*1.8,c:['#80E8FF','#38D4FF','#FFFFFF','#C0F0FF'][i%4]});
  }
  for(let i=0;i<35;i++){
    const a=(i/35)*Math.PI*2;
    sparks.push({x,y,vx:Math.cos(a)*400,vy:Math.sin(a)*400,
      life:1,decay:5+Math.random()*4,r:.3+Math.random()*.7,c:'#FFFFFF'});
  }
  // Wave 2 — t=55ms: 55 crystal shards
  setTimeout(()=>{
    for(let i=0;i<55;i++){
      const a=Math.random()*Math.PI*2,s=70+Math.random()*220;
      sparks.push({x:x+(Math.random()-.5)*44,y:y+(Math.random()-.5)*30,
        vx:Math.cos(a)*s,vy:Math.sin(a)*s-45,
        life:1,decay:.55+Math.random()*.45,r:.5+Math.random()*1.5,c:pal[Math.floor(Math.random()*7)]});
    }
  },55);
  // Wave 3 — t=110ms: 45 prismatic fragments
  setTimeout(()=>{
    for(let i=0;i<45;i++){
      const a=Math.random()*Math.PI*2,s=55+Math.random()*170;
      sparks.push({x:x+(Math.random()-.5)*60,y:y+(Math.random()-.5)*44,
        vx:Math.cos(a)*s,vy:Math.sin(a)*s-35,
        life:1,decay:.38+Math.random()*.32,r:.5+Math.random()*1.5,c:prism[Math.floor(Math.random()*7)]});
    }
  },110);
  // Wave 4 — t=190ms: 30 slow-drift motes
  setTimeout(()=>{
    for(let i=0;i<30;i++)
      sparks.push({x:x+(Math.random()-.5)*70,y,
        vx:(Math.random()-.5)*50,vy:-30-Math.random()*80,grav:1,
        life:1,decay:.22+Math.random()*.22,r:.6+Math.random()*1.4,c:pal[3+Math.floor(Math.random()*4)]});
  },190);
  // Wave 5 — t=260ms: 20 slow glowing specks
  setTimeout(()=>{
    for(let i=0;i<20;i++){
      const a=Math.random()*Math.PI*2,s=30+Math.random()*90;
      sparks.push({x:x+(Math.random()-.5)*50,y,
        vx:Math.cos(a)*s,vy:Math.sin(a)*s-50,
        life:1,decay:.14+Math.random()*.16,r:.8+Math.random()*1.6,c:prism[i%7]});
    }
  },260);
  // 2 shockwave rings
  shockwaves.push(
    {x,y,r:0,maxR:clamp(W*.13,90,170),life:.85,rgb:'56,212,255'},
    {x,y,r:0,maxR:clamp(W*.24,160,280),life:.42,rgb:'0,100,255'}
  );
}
function updSparks(dt){
  sparks.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=(p.grav||720)*dt;p.life-=p.decay*dt;});
  sparks=sparks.filter(p=>p.life>0);
}

// ── RENDER ─────────────────────────────────────────────
function render(ts){
  ctx.save();
  ctx.scale(dpr,dpr);
  if(shakeT>0&&phase!=='paused'){const s=shakeT*shakeAmt;ctx.translate((Math.random()-.5)*s,(Math.random()-.5)*s*.55);}

  // ROYAL NAVY SKY — bright enough to contrast with lime dino
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#121F42');sky.addColorStop(.3,'#1B2E5A');
  sky.addColorStop(.65,'#172650');sky.addColorStop(1,'#101D40');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  // Teal nebula — top right (boosted for lighter bg)
  const nxA=W*.76+Math.sin(ts/10000)*.18*W,nyA=H*.12+Math.cos(ts/12000)*12;
  const ngA=ctx.createRadialGradient(nxA,nyA,0,nxA,nyA,W*.38);
  ngA.addColorStop(0,'rgba(0,160,255,.12)');ngA.addColorStop(.45,'rgba(0,120,200,.05)');ngA.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ngA;ctx.beginPath();ctx.arc(nxA,nyA,W*.38,0,Math.PI*2);ctx.fill();

  // Warm nebula — left mid
  const nxB=W*.18+Math.sin(ts/9000+2)*12,nyB=H*.28+Math.cos(ts/11000+1)*10;
  const ngB=ctx.createRadialGradient(nxB,nyB,0,nxB,nyB,W*.24);
  ngB.addColorStop(0,'rgba(60,40,180,.09)');ngB.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ngB;ctx.beginPath();ctx.arc(nxB,nyB,W*.24,0,Math.PI*2);ctx.fill();

  // Palantir dot grid
  const gSz=44,gOff=scrollX*.008%gSz;
  ctx.fillStyle='rgba(80,130,255,.024)';
  for(let gx=-gOff;gx<W+gSz;gx+=gSz)
    for(let gy=0;gy<H*.68;gy+=gSz){ctx.beginPath();ctx.arc(gx,gy,.85,0,Math.PI*2);ctx.fill();}

  // Stars
  for(let i=0;i<64;i++){
    const sx=((i*137.5+scrollX*.022)%(W+20))-10,sy=(i*71.3)%(H*.56);
    const tw=.52+.48*Math.sin(ts/360+i*1.4);
    const r=i%7===0?1.6:i%3===0?1.1:.65;
    ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(220,235,255,${(.18+(i%3)*.13)*tw})`;ctx.fill();
    if(i%7===0&&tw>.8){
      ctx.strokeStyle=`rgba(180,220,255,${(tw-.8)*.25})`;ctx.lineWidth=.6;
      ctx.beginPath();ctx.moveTo(sx-6,sy);ctx.lineTo(sx+6,sy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(sx,sy-6);ctx.lineTo(sx,sy+6);ctx.stroke();
    }
  }

  // Aurora
  const aY=H*.32+Math.sin(ts/2400)*11;
  const aG=ctx.createLinearGradient(0,aY-28,0,aY+28);
  aG.addColorStop(0,'rgba(0,200,255,0)');aG.addColorStop(.5,'rgba(0,200,255,.038)');aG.addColorStop(1,'rgba(0,200,255,0)');
  ctx.fillStyle=aG;ctx.fillRect(0,aY-28,W,56);

  // Horizon glow
  const hG=ctx.createLinearGradient(0,H*.62,0,H*.46);
  hG.addColorStop(0,'rgba(0,160,255,0)');hG.addColorStop(1,'rgba(0,160,255,.055)');
  ctx.fillStyle=hG;ctx.fillRect(0,H*.46,W,H*.18);

  // Far mountains
  const mf=scrollX*.1;
  ctx.fillStyle='#0A1020';ctx.beginPath();ctx.moveTo(0,H);
  for(let x=0;x<=W;x+=3)ctx.lineTo(x,H*.5+Math.sin((x+mf)*.0033)*60+Math.sin((x+mf)*.008+1)*30);
  ctx.lineTo(W,H);ctx.closePath();ctx.fill();

  // Near hills
  const mn=scrollX*.28;
  ctx.fillStyle='#080B14';ctx.beginPath();ctx.moveTo(0,H);
  for(let x=0;x<=W;x+=3)ctx.lineTo(x,H*.67+Math.sin((x+mn)*.005)*40+Math.sin((x+mn)*.013+2)*18);
  ctx.lineTo(W,H);ctx.closePath();ctx.fill();

  // Trees
  const tf=scrollX*.52;ctx.fillStyle='#05080F';
  for(let i=0;i<16;i++){
    const tx=((i*136+18-tf)%(W+160))-80,th=28+(i*41%34),tw2=13+(i*23%15);
    ctx.beginPath();ctx.moveTo(tx-tw2,H-GNDH+2);
    ctx.quadraticCurveTo(tx,H-GNDH-th,tx+tw2,H-GNDH+2);ctx.fill();
  }

  // Ground
  ctx.fillStyle='#060912';ctx.fillRect(0,H-GNDH,W,GNDH);
  ctx.fillStyle='#0A0F1E';ctx.fillRect(0,H-GNDH,W,3);
  ctx.fillStyle='rgba(0,200,255,.28)';ctx.fillRect(0,H-GNDH,W,1.5);
  ctx.fillStyle='rgba(0,0,0,.22)';
  const goff2=scrollX%82;
  for(let gx=-goff2;gx<W+82;gx+=82)ctx.fillRect(gx,H-GNDH+5,36,2);

  // Speed lines
  if(phase==='playing'){
    const spF=clamp((speed-240)/(SPD_MAX-240),0,1);
    if(spF>0){
      SPEEDLINES.forEach((sl,i)=>{
        const len=(65+i*20)*(.4+spF*.6);
        const sx=W-((scrollX*2.4+sl.ph*W*1.3)%(W+len+60));
        const gr=ctx.createLinearGradient(sx,0,sx+len,0);
        gr.addColorStop(0,'rgba(0,200,255,0)');gr.addColorStop(.25,'rgba(0,200,255,1)');gr.addColorStop(1,'rgba(0,200,255,0)');
        ctx.fillStyle=gr;ctx.globalAlpha=spF*.18;ctx.fillRect(sx,sl.yR*H,len,1.3);
      });
      ctx.globalAlpha=1;
    }
  }

  // Columns + coins
  if(phase!=='idle')cols.forEach(c=>{drawCol(c);drawGem(c,ts);});

  // Bird ground shadow — grows as dino approaches ground
  if(phase==='playing'||phase==='dead'){
    const gdist=H-GNDH-bird.y;
    const gsa=Math.max(0,1-gdist/(H*.45))*.26;
    if(gsa>0){
      const sw=BIRD_SZ*(.42+Math.min(.46,1-gdist/(H*.5)));
      const shadG=ctx.createRadialGradient(W*.22,H-GNDH-1,0,W*.22,H-GNDH-1,sw);
      shadG.addColorStop(0,`rgba(0,0,0,${gsa})`);shadG.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=shadG;ctx.beginPath();
      ctx.ellipse(W*.22,H-GNDH-2,sw,sw*.16,0,0,Math.PI*2);ctx.fill();
    }
  }
  // Bird
  const bRot=phase==='dead'?deathRot:clamp(bird.vy/1280,-.46,.92);
  drawBird(W*.22,bird.y,bRot,wingP);

  // Shockwave rings
  shockwaves.forEach(s=>{
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${s.rgb},${s.life*.55})`;
    ctx.lineWidth=2.5*s.life;ctx.stroke();
  });

  // Death flash — percussive white pop on impact
  if(phase==='dead'&&deadT<.09){
    ctx.fillStyle=`rgba(255,255,255,${(.09-deadT)/.09*.82})`;
    ctx.fillRect(0,0,W,H);
  }

  // Sparks — additive blending: overlapping particles bloom to white
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  sparks.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life*p.life)*(p.a||.82);
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*Math.max(.1,p.life),0,Math.PI*2);
    ctx.fillStyle=p.c;ctx.fill();
  });
  ctx.restore();
  ctx.globalAlpha=1;

  // Milestone flash
  if(milestoneFx.alpha>0){
    ctx.globalAlpha=milestoneFx.alpha*.13;
    ctx.fillStyle=milestoneFx.color;ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;
  }

  // ── SCORE HUD ────────────────────────────────────────
  if(phase==='playing'||(phase==='dead'&&deadT<.6)){
    const sz=clamp(H*.09,32,68);
    const cx=W/2;
    ctx.font=`700 ${sz}px -apple-system,BlinkMacSystemFont,sans-serif`;
    const numW=ctx.measureText(score.toString()).width;
    const pw=Math.max(sz*2.2,numW+sz*.9);
    const ph2=sz*1.52,pr=ph2/2,px=cx-pw/2,py=H*.04;
    const ps=1+scorePulse*.08;
    ctx.save();
    ctx.translate(cx,py+ph2/2);ctx.scale(ps,ps);ctx.translate(-cx,-(py+ph2/2));
    rrect(px,py,pw,ph2,pr);
    ctx.fillStyle='rgba(8,16,32,.78)';ctx.fill();
    rrect(px,py,pw,ph2,pr);
    ctx.strokeStyle=`rgba(0,200,255,${.14+scorePulse*.45})`;ctx.lineWidth=1;ctx.stroke();
    const level=Math.floor(score/10)+1;
    ctx.font=`600 ${clamp(H*.018,7,11)}px 'SF Mono','Consolas','Courier New',monospace`;
    ctx.textAlign='center';
    const lvlAlpha=levelUpFx>.5?.55+levelUpFx*.4:.32+scorePulse*.3;
    ctx.fillStyle=levelUpFx>.5?`rgba(0,255,180,${lvlAlpha})`:`rgba(0,200,255,${lvlAlpha})`;
    ctx.fillText(`LV.${level}`,cx,py+ph2*.3);
    ctx.font=`700 ${sz}px -apple-system,BlinkMacSystemFont,sans-serif`;
    ctx.fillStyle=scoreFx>0?`rgba(150,255,110,${.92+scoreFx*.08})`:'rgba(230,242,255,.95)';
    ctx.fillText(score,cx,py+ph2*.72);
    const barW=pw*.68,barX=cx-barW/2,barY=py+ph2*.88;
    rrect(barX,barY,barW,2.5,1.25);ctx.fillStyle='rgba(255,255,255,.07)';ctx.fill();
    const prog=(score%10)/10;
    if(prog>0){
      const bfg=ctx.createLinearGradient(barX,0,barX+barW,0);
      bfg.addColorStop(0,'rgba(0,160,255,.85)');bfg.addColorStop(1,'rgba(0,255,200,.9)');
      ctx.fillStyle=bfg;rrect(barX,barY,barW*prog,2.5,1.25);ctx.fill();
    }
    ctx.restore();
    if(hiScore>0){
      ctx.font=`500 ${clamp(H*.02,8,12)}px -apple-system,BlinkMacSystemFont,sans-serif`;
      ctx.textAlign='center';ctx.fillStyle='rgba(0,180,255,.38)';
      ctx.fillText(`BEST  ${hiScore}`,cx,py+ph2+clamp(H*.025,10,16));
    }
    if(newBestFx>0){
      ctx.font=`700 ${clamp(H*.024,9,14)}px -apple-system,BlinkMacSystemFont,sans-serif`;
      ctx.fillStyle=`rgba(0,220,180,${newBestFx})`;
      ctx.fillText('NEW BEST!',cx,py+ph2+clamp(H*.055,22,34));
    }
    if(levelUpFx>0){
      const lusz=clamp(H*.028,10,16);
      ctx.font=`700 ${lusz}px -apple-system,BlinkMacSystemFont,sans-serif`;
      ctx.fillStyle=`rgba(0,255,180,${levelUpFx*.9})`;
      ctx.fillText(`LEVEL ${level}  UNLOCKED`,cx,py-clamp(H*.022,8,14));
    }

    // ── STREAK BADGE ─────────────────────────────────
    if(streak>=3){
      const sa=clamp(streakFx+.5,0,1);
      const sw=clamp(H*.055,24,44),sh=clamp(H*.032,14,24),sr=sh/2;
      const milestone=streak%5===0&&streakFx>.5;
      const sx2=cx+pw/2+clamp(W*.025,8,18),sy2=py;
      rrect(sx2,sy2,sw,sh,sr);
      ctx.fillStyle=milestone?`rgba(255,160,30,${sa*.82})`:`rgba(255,100,20,${sa*.7})`;ctx.fill();
      rrect(sx2,sy2,sw,sh,sr);
      ctx.strokeStyle=`rgba(255,200,80,${sa*.5})`;ctx.lineWidth=1;ctx.stroke();
      ctx.font=`700 ${clamp(H*.02,8,13)}px -apple-system,BlinkMacSystemFont,sans-serif`;
      ctx.fillStyle=`rgba(255,240,180,${sa*.95})`;
      ctx.textAlign='center';
      ctx.fillText(`×${streak}`,sx2+sw/2,sy2+sh*.66);
    }
  }

  // ── IDLE SCREEN ──────────────────────────────────────
  if(phase==='idle'){
    let tsz=clamp(H*.12,34,92);
    ctx.textAlign='left';
    ctx.font=`900 ${tsz}px -apple-system,BlinkMacSystemFont,sans-serif`;
    let dinoW=ctx.measureText('DINO').width;
    ctx.font=`italic 800 ${Math.round(tsz*1.06)}px 'Playfair Display',Georgia,serif`;
    let soarW=ctx.measureText('SOAR').width;
    let totalW=dinoW+2+soarW;
    if(totalW>W*.9){
      tsz*=(W*.9)/totalW;
      ctx.font=`900 ${tsz}px -apple-system,BlinkMacSystemFont,sans-serif`;
      dinoW=ctx.measureText('DINO').width;
      ctx.font=`italic 800 ${Math.round(tsz*1.06)}px 'Playfair Display',Georgia,serif`;
      soarW=ctx.measureText('SOAR').width;
      totalW=dinoW+2+soarW;
    }
    const sx2=W/2-totalW/2,ty=H*.28+tsz*.35;

    const shift=((ts/6200)%1)*totalW*2;
    const gW=totalW*3;
    const tg=ctx.createLinearGradient(sx2-shift,0,sx2-shift+gW,0);
    tg.addColorStop(0,'#7EFF50');tg.addColorStop(.16,'#00FFCC');
    tg.addColorStop(.33,'#00AAFF');tg.addColorStop(.5,'#9B5CF6');
    tg.addColorStop(.66,'#7EFF50');tg.addColorStop(.82,'#00FFCC');tg.addColorStop(1,'#00AAFF');

    ctx.fillStyle='rgba(0,0,0,.3)';
    ctx.font=`900 ${tsz}px -apple-system,BlinkMacSystemFont,sans-serif`;
    ctx.fillText('DINO',sx2+3,ty+3);
    ctx.font=`italic 800 ${Math.round(tsz*1.06)}px 'Playfair Display',Georgia,serif`;
    ctx.fillText('SOAR',sx2+dinoW+2+3,ty+3);

    ctx.fillStyle=tg;
    ctx.font=`900 ${tsz}px -apple-system,BlinkMacSystemFont,sans-serif`;
    ctx.fillText('DINO',sx2,ty);
    ctx.font=`italic 800 ${Math.round(tsz*1.06)}px 'Playfair Display',Georgia,serif`;
    ctx.fillText('SOAR',sx2+dinoW+2,ty);

    ctx.textAlign='center';
    ctx.font=`300 ${clamp(H*.034,11,19)}px -apple-system,BlinkMacSystemFont,sans-serif`;
    ctx.fillStyle='rgba(160,200,255,.44)';
    ctx.fillText(W<520?'Tap to flap':'Tap or press space to flap',W/2,ty+clamp(H*.07,28,52));
    if(hiScore>0){
      ctx.font=`600 ${clamp(H*.026,9,14)}px 'SF Mono','Consolas','Courier New',monospace`;
      ctx.fillStyle='rgba(0,180,255,.55)';
      ctx.fillText(`BEST  ${hiScore}`,W/2,ty+clamp(H*.12,48,88));
    }
    ctx.font=`600 ${clamp(H*.022,8,12)}px 'SF Mono','Consolas','Courier New',monospace`;
    ctx.fillStyle=`rgba(0,200,255,${.35+.35*Math.sin(ts/560)})`;
    ctx.fillText('TAP ANYWHERE',W/2,H*.84);
  }

  // ── DEAD SCREEN ──────────────────────────────────────
  if(phase==='dead'&&deadT>.55){
    const a=Math.min(1,(deadT-.55)/.45);
    ctx.fillStyle=`rgba(4,8,18,${a*.8})`;ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=a;ctx.textAlign='center';
    let dsz=clamp(H*.14,52,104);
    ctx.font=`900 ${dsz}px -apple-system,BlinkMacSystemFont,sans-serif`;
    if(ctx.measureText('EXTINCT').width>W*.88)dsz*=(W*.88)/ctx.measureText('EXTINCT').width;
    ctx.font=`900 ${dsz}px -apple-system,BlinkMacSystemFont,sans-serif`;
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillText('EXTINCT',W/2+3,H*.32+dsz*.35+3);
    ctx.fillStyle='rgba(220,235,255,.95)';ctx.fillText('EXTINCT',W/2,H*.32+dsz*.35);
    const ssz=clamp(H*.085,32,68),spw=ssz*2.4,sph=ssz*1.52,scx=W/2,scy=H*.56;
    rrect(scx-spw/2,scy-sph*.65,spw,sph,sph/2);
    ctx.fillStyle='rgba(8,16,32,.72)';ctx.fill();
    rrect(scx-spw/2,scy-sph*.65,spw,sph,sph/2);
    ctx.strokeStyle='rgba(0,200,255,.2)';ctx.lineWidth=1;ctx.stroke();
    ctx.font=`700 ${ssz}px -apple-system,BlinkMacSystemFont,sans-serif`;
    ctx.fillStyle='#7EFF50';ctx.fillText(score,scx,scy+ssz*.18);
    ctx.font=`500 ${clamp(H*.022,8,13)}px 'SF Mono','Consolas','Courier New',monospace`;
    ctx.fillStyle='rgba(0,200,255,.45)';ctx.fillText('SCORE',scx,scy+ssz*.44);
    const deadLevel=Math.floor(score/10)+1;
    ctx.font=`600 ${clamp(H*.02,8,12)}px 'SF Mono','Consolas','Courier New',monospace`;
    ctx.fillStyle='rgba(0,220,160,.6)';ctx.fillText(`LV.${deadLevel}`,scx,scy+ssz*.68);
    if(hiScore>0){
      ctx.font=`600 ${clamp(H*.03,11,18)}px 'SF Mono','Consolas','Courier New',monospace`;
      ctx.fillStyle='rgba(0,180,255,.6)';ctx.fillText(`BEST  ${hiScore}`,W/2,H*.73);
    }
    ctx.font=`600 ${clamp(H*.022,8,12)}px 'SF Mono','Consolas','Courier New',monospace`;
    ctx.fillStyle=`rgba(0,200,255,${.38+.38*Math.sin(ts/600)})`;
    ctx.fillText('TAP TO RETRY',W/2,H*.84);
    ctx.globalAlpha=1;
  }

  // ── PAUSE OVERLAY ────────────────────────────────────
  if(phase==='paused'){
    ctx.fillStyle='rgba(4,8,18,.82)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    const psz=clamp(H*.11,42,88);
    ctx.font=`900 ${psz}px -apple-system,BlinkMacSystemFont,sans-serif`;
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillText('PAUSED',W/2+2,H*.44+psz*.35+2);
    ctx.fillStyle='rgba(220,235,255,.95)';ctx.fillText('PAUSED',W/2,H*.44+psz*.35);
    ctx.font=`600 ${clamp(H*.022,8,12)}px 'SF Mono','Consolas','Courier New',monospace`;
    ctx.fillStyle=`rgba(0,200,255,${.38+.38*Math.sin(ts/600)})`;
    ctx.fillText('TAP TO RESUME',W/2,H*.58);
  }

  ctx.restore();
}

// ── DRAW COLUMN ───────────────────────────────────────
function drawCol(c){
  const x=c.x,w=PIPE_W,topH=c.mid-c.gapH/2,botY=c.mid+c.gapH/2,cw=w+14,ch=18,cx2=c.x-7;
  const fl=c.flashT;
  const bg=ctx.createLinearGradient(x,0,x+w,0);
  bg.addColorStop(0,'#04081A');bg.addColorStop(.4,'#0C1438');
  bg.addColorStop(.6,'#0C1438');bg.addColorStop(1,'#04081A');
  ctx.fillStyle=bg;ctx.fillRect(x,0,w,topH);ctx.fillRect(x,botY,w,H-botY);
  ctx.fillStyle=fl>0?`rgb(${~~lerp(14,126,fl)},${~~lerp(24,255,fl)},${~~lerp(58,80,fl)})`:'#0E1840';
  ctx.fillRect(cx2,topH-ch,cw,ch);ctx.fillRect(cx2,botY,cw,ch);
  const ga=.32+fl*.55;
  const g1=ctx.createLinearGradient(0,topH-32,0,topH);
  g1.addColorStop(0,'rgba(126,255,80,0)');g1.addColorStop(1,`rgba(126,255,80,${ga})`);
  ctx.fillStyle=g1;ctx.fillRect(cx2,topH-32,cw,32);
  const g2=ctx.createLinearGradient(0,botY,0,botY+32);
  g2.addColorStop(0,`rgba(126,255,80,${ga})`);g2.addColorStop(1,'rgba(126,255,80,0)');
  ctx.fillStyle=g2;ctx.fillRect(cx2,botY,cw,32);
  ctx.fillStyle=`rgba(126,255,80,${.16+fl*.32})`;
  ctx.fillRect(cx2,topH-ch,cw,2);ctx.fillRect(cx2,botY+ch-2,cw,2);
  ctx.fillStyle=`rgba(126,255,80,${.1+fl*.2})`;
  ctx.fillRect(cx2,topH-2,cw,2);ctx.fillRect(cx2,botY,cw,2);
  const pgr=ctx.createRadialGradient(x+w/2,c.mid,0,x+w/2,c.mid,c.gapH*.5);
  pgr.addColorStop(0,'rgba(0,200,255,.07)');pgr.addColorStop(.5,'rgba(126,255,80,.04)');pgr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=pgr;ctx.beginPath();ctx.arc(x+w/2,c.mid,c.gapH*.5,0,Math.PI*2);ctx.fill();
}

// ── DRAW GEM ──────────────────────────────────────────
function drawGem(c,ts){
  if(!c.hasCoin||!c.coinAlive)return;
  const gx=c.x+PIPE_W/2,gy=c.mid,t=ts/1000,R=15;
  const rot=t*.7,pulse=.85+.15*Math.sin(t*2.8);
  const bob=Math.sin(t*1.6+c.baseMid*.01)*4;
  ctx.save();ctx.translate(gx,gy+bob);

  // Pulsing outer aura
  const aura=ctx.createRadialGradient(0,0,0,0,0,50);
  aura.addColorStop(0,`rgba(56,212,255,${.22*pulse})`);
  aura.addColorStop(.55,`rgba(0,120,255,${.10*pulse})`);
  aura.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=aura;ctx.beginPath();ctx.arc(0,0,50,0,Math.PI*2);ctx.fill();

  // 6 rotating light rays
  ctx.save();ctx.rotate(rot);
  for(let i=0;i<6;i++){
    const a=(i/6)*Math.PI*2;
    const lg=ctx.createLinearGradient(0,0,Math.cos(a)*38,Math.sin(a)*38);
    lg.addColorStop(0,`rgba(180,240,255,${.24*pulse})`);lg.addColorStop(1,'rgba(180,240,255,0)');
    ctx.strokeStyle=lg;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*38,Math.sin(a)*38);ctx.stroke();
  }
  ctx.restore();

  // Gem body — slowly rotating cut octagon
  ctx.save();ctx.rotate(rot*.4);
  const gp=()=>{
    ctx.beginPath();
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2-Math.PI/8,r=i%2===0?R:R*.72;
      i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath();
  };
  ctx.shadowColor='rgba(0,200,255,.95)';ctx.shadowBlur=28;
  gp();
  const gf=ctx.createRadialGradient(-R*.25,-R*.35,0,0,0,R*1.1);
  gf.addColorStop(0,'rgba(220,248,255,.98)');
  gf.addColorStop(.25,'rgba(100,210,255,.95)');
  gf.addColorStop(.65,'rgba(20,130,255,.92)');
  gf.addColorStop(1,'rgba(0,50,200,.88)');
  ctx.fillStyle=gf;ctx.fill();
  ctx.shadowBlur=0;

  // Facet lines
  ctx.strokeStyle='rgba(200,240,255,.55)';ctx.lineWidth=1;
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2-Math.PI/8,r=i%2===0?R:R*.72;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);ctx.stroke();
  }

  // Rotating highlight shimmer
  const ha=rot*2.5,hx=Math.cos(ha)*R*.35,hy=Math.sin(ha)*R*.35;
  const hg=ctx.createRadialGradient(hx,hy,0,hx,hy,R*.52);
  hg.addColorStop(0,`rgba(255,255,255,${.9*pulse})`);hg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=hg;ctx.beginPath();ctx.arc(hx,hy,R*.52,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // 3 orbiting sparkle dots
  [[1.4,2.0,32],[.9,-1.6,38],[1.8,1.1,35]].forEach(([spd,off,orR],i)=>{
    const oa=t*spd+off,op=.5+.5*Math.sin(t*3+i*2.1);
    ctx.fillStyle=`rgba(180,240,255,${op*.9})`;
    ctx.beginPath();ctx.arc(Math.cos(oa)*orR,Math.sin(oa)*orR,2+op*1.2,0,Math.PI*2);ctx.fill();
  });

  ctx.restore();
}

// ── DRAW 8-BIT BRONTOSAURUS WITH WINGS ───────────────
// Brontosaurus silhouette: long neck rising up-right, oval body,
// tapering tail extending left. Wings pivot from upper-left of body.
// All pixels same #38D4FF — wings and body read as one unified character.
function drawBird(x,y,rot,wp){
  ctx.save();ctx.translate(x,y);ctx.rotate(rot);
  const ps=clamp(Math.round(BIRD_SZ/20),2,4);
  const wa=(wp-.5)*52*Math.PI/180;
  ctx.shadowColor='rgba(0,200,255,.88)';ctx.shadowBlur=ps*3.5;
  ctx.fillStyle='#38D4FF';

  // B(c,r): pixel centered at (c*ps, r*ps) in body space (origin = body center)
  const B=(c,r)=>ctx.fillRect(c*ps-ps*.5,r*ps-ps*.5,ps,ps);
  // W(c,r): pixel in local wing space (after translate+rotate)
  const W=(c,r)=>ctx.fillRect(c*ps,r*ps,ps,ps);

  // Wings — thick filled shape, pivot from upper-left of body
  ctx.save();ctx.translate(-3.5*ps,-1*ps);ctx.rotate(-wa);
  [[0,-1],[0,0],
   [-1,-1],[-1,0],
   [-2,-2],[-2,-1],
   [-3,-2],[-3,-1],
   [-4,-3],[-4,-2],[-4,-1],
   [-5,-3],[-5,-2],[-5,-1],
   [-6,-3],[-6,-2],[-6,-1],
   [-7,-2],[-7,-1],
   [-8,-2],[-8,-1],
   [-9,-1],[-10,-1]
  ].forEach(([c,r])=>W(c,r));
  ctx.restore();
  ctx.save();ctx.translate(-3.5*ps,-1*ps);ctx.rotate(wa);
  [[0,0],[0,1],
   [-1,0],[-1,1],
   [-2,1],[-2,2],
   [-3,1],[-3,2],
   [-4,1],[-4,2],[-4,3],
   [-5,1],[-5,2],[-5,3],
   [-6,1],[-6,2],[-6,3],
   [-7,1],[-7,2],
   [-8,1],[-8,2],
   [-9,1],[-10,1]
  ].forEach(([c,r])=>W(c,r));
  ctx.restore();

  // Brontosaurus body
  [// Oval body with shoulder hump at top-right for neck attachment
   [-3,-2],[-2,-2],[-1,-2],[0,-2],[1,-2],[2,-2],[3,-2],
   [4,-2],[5,-2],  // shoulder hump
   [-4,-1],[-3,-1],[-2,-1],[-1,-1],[0,-1],[1,-1],[2,-1],[3,-1],[4,-1],
   [-4,0], [-3,0], [-2,0], [-1,0], [0,0], [1,0], [2,0], [3,0], [4,0],
   [-4,1], [-3,1], [-2,1], [-1,1], [0,1], [1,1], [2,1], [3,1], [4,1],
   [-3,2], [-2,2], [-1,2], [0,2],  [1,2], [2,2], [3,2],
   // Long neck — 3-wide base tapering to 2-wide as it rises
   [3,-3],[4,-3],[5,-3],
   [3,-4],[4,-4],[5,-4],
   [3,-5],[4,-5],
   [3,-6],[4,-6],
   [3,-7],[4,-7],
   // Small brontosaurus head at top of neck
   [3,-8],[4,-8],[5,-8],[6,-8],
   [4,-9],[5,-9],[6,-9],
   // Tapering tail extending left from body
   [-5,-1],[-6,-1],[-7,-1],
   [-5,0], [-6,0], [-7,0],
   [-7,1], [-8,1],
   [-9,2],
   // Two pairs of long pillar legs
   [-1,3],[0,3],[-1,4],[0,4],[-1,5],[0,5],
   [2,3],[3,3],[2,4],[3,4],[2,5],[3,5],
  ].forEach(([c,r])=>B(c,r));

  // Eye — single dark pixel near front of head (sauropod eye is high and forward)
  ctx.shadowBlur=0;ctx.fillStyle='#001848';
  B(5,-9);

  ctx.restore();
}

// ── LOOP ──────────────────────────────────────────────
function loop(ts){
  if(lastTs===0)lastTs=ts;
  const dt=Math.min((ts-lastTs)/1000,.05);
  lastTs=ts;update(dt,ts);render(ts);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
